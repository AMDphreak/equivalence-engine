name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up D
      uses: dlang-community/setup-dlang@v1
      with:
        compiler: ldc-latest

    - name: Build
      run: dub build

    - name: Run Verification
      run: |
        # Create a test file
        echo "from PyQt5.QtWidgets import QApplication, QAction" > test_qt5.py
        ./qt-upgrader --path test_qt5.py --rules rules/qt5_to_qt6.sdl
        grep "PyQt6" test_qt5.py
        grep "QtGui" test_qt5.py
