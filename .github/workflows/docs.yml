name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'homepage/**'
      - 'docs/**'
      - 'assets/**'
      - 'supplemental-ui/**'
      - 'antora-playbook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'homepage/**'
      - 'docs/**'
      - 'assets/**'
      - 'supplemental-ui/**'
      - 'antora-playbook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Antora Docs
        run: pnpm run build

      - name: Assemble Staging Folder
        run: |
          mkdir -p dist/docs
          # Copy Antora site to dist/docs
          cp -R build/site/* dist/docs/
          # Copy custom landing page to dist root
          cp -R homepage/* dist/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
